[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --strict-markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    hmrc: marks tests that hit the HMRC sandbox (deselected by default)
    integration: marks tests that need database/network
filterwarnings =
    ignore::DeprecationWarning
